name: Bug Report
description: Report something that is broken or not working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        A clear description of the bug.

        ## Steps to Reproduce
        1.
        2.
        3.

        ## Expected Behavior
        What you expected to happen.

        ## Actual Behavior
        What actually happened.

        ## Environment
        - OS: [e.g. macOS 14, Windows 11, Ubuntu 22.04]
        - Docker version: [e.g. 24.0.7]
        - Browser: [e.g. Chrome 120]
        - Deployment: [e.g. Docker Compose on localhost, VPS, etc.]

        ## Logs / Screenshots
        Add any relevant log output or screenshots here.

  - type: textarea
    id: reproduction
    attributes:
      label: "Minimal Reproduction"
      description: "Code, commands, or steps that reliably reproduce this bug"
      placeholder: |
        # Example:
        docker-compose up --build -d
        curl http://localhost:8080/health
        # → unexpected result
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other context about the problem"
      placeholder: "Anything else that might be relevant"
    validations:
      required: false
