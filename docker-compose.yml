services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minibrew-backend
    ports:
      - "8000:8000"
    environment:
      - MINIBREW_API_BASE=${MINIBREW_API_BASE:-http://localhost:8080/api}
      - MINIBREW_API_KEY=${MINIBREW_API_KEY:-}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-2000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minibrew-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped